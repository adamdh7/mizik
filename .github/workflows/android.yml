name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Generate App Assets (Icons & Splash)
        run: |
          npm install @capacitor/assets sharp
          npx capacitor-assets generate --android --icon-source Mizik.png --splash-source Mizik.png || true

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          if [ ! -f "www/index.html" ]; then echo "<html><body>Mizik App</body></html>" > www/index.html; fi

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
