<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(registration => {
            }).catch(registrationError => {
            });
        });
    }

    let points=parseInt(localStorage.getItem('points'))||0;
    let earnTimer=null;
    let pendingSlug=null;

    function savePoints(){
        localStorage.setItem('points',points);
    }
    function updatePointsDisplay(){
        const header=document.getElementById('points-header');
        if(header)header.textContent=`Points ${points}`;
    }
    function earnAndOpen(){
        if(earnTimer)clearTimeout(earnTimer);
        window.open('https://www.profitablecpmratenetwork.com/ak0xgm6xu?key=96856a216ee758b70d6c8303e964e86b','_blank');
        earnTimer=setTimeout(function(){
            points++;
            savePoints();
            updatePointsDisplay();
            earnTimer=null;
            if(pendingSlug){
                let s=pendingSlug;
                pendingSlug=null;
                navigateToPost(s);
            }
        },4000);
    }
    function navigateMenu(route){
        history.pushState({route:route},'',route);
        handleRouting();
    }
    function renderMenuRoute(route){
        let content=document.getElementById('content-menu');
        if(route==='/menu'||route==='/'){
            content.innerHTML=`
            <h1>Menu</h1>
            <div onclick="navigateMenu('/points');" style="text-align:center;font-size:36px;color:#ccc;padding:60px 0;cursor:pointer">Points</div>
            <div onclick="navigateMenu('/info');" style="text-align:center;font-size:36px;color:#ccc;padding:60px 0;cursor:pointer">Infos</div>
            `;
        }else if(route==='/points'){
            content.innerHTML=`
            <h1 id="points-header">Points ${points}</h1>
            <div class="click-text" onclick="earnAndOpen()">Clicks</div>
            `;
        }else if(route==='/info'){
            content.innerHTML=`
            <h1>Infos</h1>
            <p>Le système de points récompense votre activité sur le web.</p>
            <p>Pour avoir des points : allez dans Points, cliquez sur le bouton, attendez au moins 4 secondes sur le lien ouvert puis revenez sur le site. Vos points augmentent de +1 à chaque clic validé.</p>
            <p>Explication des catégories du web :</p>
            <p><strong>M</strong> : Multimédia, Musique, Podcasts, Audio.</p>
            <p><strong>I</strong> : Images, Films, Longs-métrages, Cinéma.</p>
            <p><strong>Z</strong> : Zapping, Séries TV, Short-videos, Divertissement.</p>
            <p><strong>I</strong> : Information, Documentaires, Reportages, Savoir.</p>
            <p><strong>K</strong> : Kilti, Culture, Traditions, Patrimoine, Folklore.</p>
            `;
        }
        updatePointsDisplay();
    }

    const DATA_URL = "https://server.mizik.adamdh7.org/get-all";
    
    let allPosts = [];
    let currentPostIndex = -1;

    function createSlug(name) {
        return name.toLowerCase()
            .trim()
            .replace(/[^\w\s-]/g, '')
            .replace(/\s+/g, '-')
            .replace(/-+/g, '-');
    }

    function formatDescription17(text) {
        if(!text) return "";
        const words = text.split(/\s+/);
        return words.slice(0, 17).join(' ') + (words.length > 17 ? '...' : '');
    }

    function escapeHtml(unsafe) {
        if (unsafe === null || unsafe === undefined) return '';
        return String(unsafe)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function nl2brSafe(text) {
        if (text === null || text === undefined) return '';
        let s = String(text);
        s = s.replace(/\\n/g, '\n');
        s = escapeHtml(s);
        s = s.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        return s.replace(/\n/g, '<br>');
    }

    function shuffleArray(a) {
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = a[i];
            a[i] = a[j];
            a[j] = tmp;
        }
        return a;
    }

    function levenshtein(a,b){
        let t;
        if(a.length===0)return b.length;
        if(b.length===0)return a.length;
        if(a.length>b.length){t=a;a=b;b=t;}
        let r=Array(a.length+1).fill(0).map((_,i)=>i);
        for(let i=1;i<=b.length;i++){
            let p=i;
            for(let j=1;j<=a.length;j++){
                let v=(b.charAt(i-1)===a.charAt(j-1))?r[j-1]:Math.min(r[j-1]+1,p+1,r[j]+1);
                r[j-1]=p;
                p=v;
            }
            r[a.length]=p;
        }
        return r[a.length];
    }

    function searchScore(query,item){
        let q=query.toLowerCase().trim();
        let name=String(item.name).toLowerCase();
        let desc=String(item.description).toLowerCase();
        let bio=String(item.bio).toLowerCase();
        if(name===q)return 777;
        let s=0;
        if(name.includes(q))s+=200;
        let qWords=q.split(/\s+/).filter(Boolean);
        let nWords=name.split(/\s+/).filter(Boolean);
        for(let w of qWords){
            let bestMatchScore=0;
            for(let nw of nWords){
                if(nw===w){
                    bestMatchScore=Math.max(bestMatchScore,200);
                }else if(nw.includes(w)||w.includes(nw)){
                    bestMatchScore=Math.max(bestMatchScore,100);
                }else{
                    let d=levenshtein(w,nw);
                    let maxLen=Math.max(w.length,nw.length);
                    let similarity=(maxLen-d)/maxLen;
                    if(similarity>=0.8)bestMatchScore=Math.max(bestMatchScore,90);
                    else if(similarity>=0.6)bestMatchScore=Math.max(bestMatchScore,60);
                    else if(similarity>=0.4)bestMatchScore=Math.max(bestMatchScore,30);
                    else if(similarity>=0.2)bestMatchScore=Math.max(bestMatchScore,10);
                }
            }
            s+=bestMatchScore;
        }
        if(desc.includes(q))s+=30;
        if(bio.includes(q))s+=20;
        return Math.min(777,s);
    }

    const searchInput = document.getElementById('search-input');

    function doSearch() {

            handleRouting();
        }
    }

    function executeSearch(query) {
        loadingEl.style.cssText = 'display:block;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;';
        postListEl.style.display = 'none';

        setTimeout(() => {
            let filtered = allPosts.map(p => {
                p._searchScore = searchScore(query, p);
                return p;
            }).filter(p => p._searchScore > 0);
            
            filtered.sort((a, b) => {
                if(b._searchScore !== a._searchScore) return b._searchScore - a._searchScore;
                return a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'});
            });

    function navigateToPost(slug) {

    function showSitemapXML(){
        const loading=document.getElementById('loading');

        let xml='<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n  <url>\n    <loc>https://mizik.adamdh7.org/</loc>\n    <lastmod>'+new Date().toISOString().split('T')[0]+'</lastmod>\n    <changefreq>daily</changefreq>\n    <priority>1.0</priority>\n  </url>';

    function handleRouting(){
        const path=window.location.pathname;
        document.getElementById('home-view').style.display='none';
        document.getElementById('player-view').classList.remove('active');
        document.getElementById('menu-view').style.display='none';

        if(path==='/sitemap.xml'||path==='/sitemap'){
            generateSitemap();
            return;
        }
        if(path==='/menu'||path==='/points'||path==='/info'){
            document.getElementById('menu-view').style.display='block';
            renderMenuRoute(path);
            return;
        }

        if(path.startsWith('/key=')) {
            document.getElementById('home-view').style.display='flex';
            closePlayer();
            const query = decodeURIComponent(path.slice(5)).trim();
            searchInput.value = query;
            executeSearch(query);
            return;
        }

        const slug=path.slice(1);
        if(!slug || slug === ''){
            document.getElementById('home-view').style.display='flex';
            searchInput.value = '';
            renderHome(allPosts);
            closePlayer();
            document.querySelector('header').style.transform = 'translateY(0)';
            return;
        }

        const postIndex=allPosts.findIndex(function(p){return p.slug===slug;});
        if(postIndex!==-1){
            openPlayer(allPosts[postIndex],postIndex);
        }else{
            document.getElementById('home-view').style.display='flex';
            searchInput.value = '';
            closePlayer();
            renderHome(allPosts);
            document.querySelector('header').style.transform = 'translateY(0)';
        }
    }

    window.addEventListener('popstate', handleRouting);

    function openPlayer(post, index) {
        currentPostIndex = index;
        
        const playerView = document.getElementById('player-view');
        playerView.classList.add('active');

        document.getElementById('video-title').textContent = post.name;
        document.getElementById('video-bio').innerHTML = nl2brSafe(post.description || post.bio || '');

        const similarList = document.getElementById('similar-list');
        similarList.innerHTML = "";
        
        const currentName = post.name.toLowerCase();
        const currentNameWords = currentName.split(/\s+/).filter(Boolean);
        const currentDescWords = String(post.description || "").toLowerCase().split(/\s+/).filter(w => w.length > 3);
        const currentBioWords = String(post.bio || "").toLowerCase().split(/\s+/).filter(w => w.length > 3);
        
        let suggestions = allPosts.map(p => {
            if (p.slug === post.slug) return null;
            
            const pName = p.name.toLowerCase();
            const pNameWords = pName.split(/\s+/).filter(Boolean);
            const pDescWords = String(p.description || "").toLowerCase().split(/\s+/).filter(w => w.length > 3);
            const pBioWords = String(p.bio || "").toLowerCase().split(/\s+/).filter(w => w.length > 3);
            
            let sharedName = currentNameWords.filter(w => pNameWords.includes(w)).length;
            let sharedDesc = currentDescWords.filter(w => pDescWords.includes(w)).length;
            let sharedBio = currentBioWords.filter(w => pBioWords.includes(w)).length;
            
            let namePrefixMatch = false;
            let minLen = Math.min(currentNameWords.length, pNameWords.length);
            let prefixCount = 0;
            for(let i=0; i<minLen; i++){
                if(currentNameWords[i] === pNameWords[i]) prefixCount++;
                else break;
            }
            if(prefixCount >= 2 || (prefixCount >= 1 && currentNameWords.length <= 2)) namePrefixMatch = true;
            
            let nameMatch = sharedName >= Math.max(2, Math.floor(currentNameWords.length * 0.5)) || namePrefixMatch;
            let descMatch = sharedDesc >= 7;
            let bioMatch = sharedBio >= 3;
            
            if(!(nameMatch || descMatch || bioMatch)) return null;
            
            p._simScore = 0;
            if(nameMatch) p._simScore += 1000 + prefixCount * 100 + sharedName * 10;
            if(descMatch) p._simScore += 500 + sharedDesc;
            if(bioMatch) p._simScore += 200 + sharedBio;
            
            return p;
        }).filter(Boolean);

        suggestions.sort((a, b) => {
            if (b._simScore !== a._simScore) return b._simScore - a._simScore;
            let cmpA = a.name.localeCompare(post.name, undefined, {numeric: true, sensitivity: 'base'});
            let cmpB = b.name.localeCompare(post.name, undefined, {numeric: true, sensitivity: 'base'});
            if (cmpA > 0 && cmpB <= 0) return -1;
            if (cmpB > 0 && cmpA <= 0) return 1;
            return a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'});
        });

        if (suggestions.length === 0) {
            let backup = allPosts.filter(p => p.slug !== post.slug);
            backup.sort((a, b) => {
                let cmpA = a.name.localeCompare(post.name, undefined, {numeric: true, sensitivity: 'base'});
                let cmpB = b.name.localeCompare(post.name, undefined, {numeric: true, sensitivity: 'base'});
                if (cmpA > 0 && cmpB <= 0) return -1;
                if (cmpB > 0 && cmpA <= 0) return 1;
                return a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'});
            });
            suggestions = backup.slice(0, 15);
        }

        window.currentNextAutoplaySlug = suggestions.length > 0 ? suggestions[0].slug : null;

        suggestions.forEach(s => {
            const div = document.createElement('div');
            div.className = 'similar-item';
            div.onclick = (e) => {
                e.stopPropagation();
                navigateToPost(s.slug);
            };
            
            const bioHtml = nl2brSafe(s.bio || s.description || '');
            div.innerHTML = `
                <img src="${s.thumb}" class="similar-thumb" loading="lazy" onerror="this.outerHTML='<div class=\\'no-thumb\\'>No Thumb</div>'">
                <div class="similar-content">
                    <div class="similar-title">${escapeHtml(s.name)}</div>
                    <div class="similar-desc">${bioHtml}</div>
                </div>
            `;
            similarList.appendChild(div);
        });

        initVideoPlayer(post.videoUrl, post.name);
    }

    function closePlayer() {
        const playerView = document.getElementById('player-view');
        const v = document.getElementById('video');
        if(v) { 
            v.pause(); 
            v.src = ""; 
            v.removeAttribute('src');
        }
        playerView.classList.remove('active');
    }

    let videoEl, seekEl, fillEl, thumbEl, currentEl, durationEl;
    let isScrubbing = false;
    let videoTimeout = null;
    let wasPlayingBeforeSeek = false;
    let longLoadTimeout = null;

    function initVideoPlayer(url, title) {
        videoEl = document.getElementById('video');
        const videoLoader = document.getElementById('videoLoader');
        const longLoadUi = document.getElementById('longLoadUi');
        const insideMini = document.getElementById('insideMini');
        const insidePlay = document.getElementById('insidePlay');
        const insideBack = document.getElementById('insideBack');
        const insideForward = document.getElementById('insideForward');
        const controlsWrap = document.getElementById('controlsWrap');
        
        seekEl = document.getElementById('seekBar');
        fillEl = document.getElementById('fill');
        thumbEl = document.getElementById('thumb');
        currentEl = document.getElementById('current');
        durationEl = document.getElementById('duration');

        if(videoTimeout) clearTimeout(videoTimeout);
        if(longLoadTimeout) clearTimeout(longLoadTimeout);
        videoTimeout = null;
        longLoadTimeout = null;

        videoEl.src = url;
        videoEl.load();
        videoEl.classList.add('contain');
        videoEl.muted = false;

        longLoadUi.style.display = 'none';
        videoLoader.classList.remove('show');

        const showLongLoadUI = () => {
            longLoadUi.style.display = 'flex';
        };

        const hideLongLoadUI = () => {
            if (longLoadTimeout) clearTimeout(longLoadTimeout);
            longLoadUi.style.display = 'none';
        };

        const startLongLoadTimer = () => {
            if (longLoadTimeout) clearTimeout(longLoadTimeout);
            longLoadTimeout = setTimeout(() => {
                if (videoEl.readyState < 3) {
                    showLongLoadUI();
                }
            }, 8000);
        };

        const togglePlay = async () => {
            try {
                if (videoEl.paused) await videoEl.play();
                else videoEl.pause();
            } catch(e) {}
        };

        const updatePlayIcon = () => { insidePlay.textContent = videoEl.paused ? '▶' : '❚❚'; };

        const showMiniControls = () => {
            insideMini.classList.remove('inside-hidden');
            insideMini.classList.add('inside-visible');
        };

        const hideMiniControls = () => {
            insideMini.classList.remove('inside-visible');
            insideMini.classList.add('inside-hidden');
        };

        insidePlay.onclick = (e) => { e.stopPropagation(); togglePlay(); };
        videoEl.onclick = (e) => { 
             const isHidden = controlsWrap.classList.contains('controls-hidden');
             if(isHidden) {
                 controlsWrap.classList.remove('controls-hidden');
                 controlsWrap.classList.add('controls-visible');
                 if(!videoLoader.classList.contains('show')){
                     showMiniControls();
                 }
             } else {
                 controlsWrap.classList.remove('controls-visible');
                 controlsWrap.classList.add('controls-hidden');
                 hideMiniControls();
             }
        };

        videoEl.onplay = () => {
            if(videoTimeout) clearTimeout(videoTimeout);
            videoLoader.classList.remove('show');
            hideLongLoadUI();
            showMiniControls();
            updatePlayIcon();
        };
        videoEl.onplaying = () => {
            if(videoTimeout) clearTimeout(videoTimeout);
            videoLoader.classList.remove('show');
            hideLongLoadUI();
            showMiniControls();
            updatePlayIcon();
        };
        videoEl.onpause = updatePlayIcon;
        
        videoEl.onwaiting = () => {
            videoLoader.classList.add('show');
            hideMiniControls();
            startLongLoadTimer();
        };
        videoEl.onseeking = () => {
            wasPlayingBeforeSeek = !videoEl.paused;
            if(wasPlayingBeforeSeek) videoEl.pause();
            videoLoader.classList.add('show');
            hideMiniControls();
            startLongLoadTimer();
        };
        videoEl.onseeked = () => {
            videoLoader.classList.remove('show');
            if(wasPlayingBeforeSeek) {
                videoEl.play().catch(e => {});
            }
            wasPlayingBeforeSeek = false;
            showMiniControls();
            hideLongLoadUI();
        };
        videoEl.onstalled = () => {
            videoLoader.classList.add('show');
            hideMiniControls();
            startLongLoadTimer();
        };
        videoEl.onerror = () => {
            videoLoader.classList.remove('show');
            showLongLoadUI();
        };
        videoEl.oncanplay = () => {
            videoLoader.classList.remove('show');
            hideLongLoadUI();
            showMiniControls();
            updatePlayIcon();
        };
        videoEl.onprogress = hideLongLoadUI;
        videoEl.ontimeupdate = () => {
            if (!isScrubbing) {
                const pct = (videoEl.currentTime / videoEl.duration) * 100 || 0;
                fillEl.style.width = pct + "%";
                thumbEl.style.left = pct + "%";
                currentEl.textContent = formatTime(videoEl.currentTime);
            }
            if (videoEl.currentTime > 0) hideLongLoadUI();
        };

        videoEl.onloadedmetadata = () => {
            durationEl.textContent = formatTime(videoEl.duration);
        };

        videoEl.onended = () => {
            if (window.currentNextAutoplaySlug) {
                navigateToPost(window.currentNextAutoplaySlug);
            } else {
                let nextIndex = currentPostIndex + 1;
                if (nextIndex >= allPosts.length) nextIndex = 0;
                if(allPosts[nextIndex]) {
                    navigateToPost(allPosts[nextIndex].slug);
                }
            }
        };

        insideBack.onclick = (e) => { 
            e.stopPropagation(); 
            videoLoader.classList.add('show');
            videoEl.currentTime = Math.max(0, videoEl.currentTime - 10); 
        };
        insideForward.onclick = (e) => { 
            e.stopPropagation(); 
            videoLoader.classList.add('show');
            videoEl.currentTime = Math.min(videoEl.duration, videoEl.currentTime + 10); 
        };

        seekEl.addEventListener('mousedown', handleScrubStart);
        seekEl.addEventListener('touchstart', handleScrubStart, { passive: false });

        function handleScrubStart(e) {
            if (e.type === 'touchstart') e.preventDefault();
            isScrubbing = true;
            videoLoader.classList.add('show');
            handleScrubMove(e);
            const moveEvent = e.type === 'touchstart' ? 'touchmove' : 'mousemove';
            const endEvent = e.type === 'touchstart' ? 'touchend' : 'mouseup';
            document.addEventListener(moveEvent, handleScrubMove, { passive: false });
            document.addEventListener(endEvent, handleScrubEnd);
        }

        function handleScrubMove(e) {
            if (!isScrubbing) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = seekEl.getBoundingClientRect();
            let pos = (clientX - rect.left) / rect.width;
            pos = Math.max(0, Math.min(1, pos));
            videoEl.currentTime = pos * videoEl.duration;
            fillEl.style.width = (pos * 100) + '%';
            thumbEl.style.left = (pos * 100) + '%';
            currentEl.textContent = formatTime(videoEl.currentTime);
        }

        function handleScrubEnd(e) {
            isScrubbing = false;
            const moveEvent = e.type === 'touchend' ? 'touchmove' : 'mousemove';
            const endEvent = e.type === 'touchend' ? 'touchend' : 'mouseup';
            document.removeEventListener(moveEvent, handleScrubMove);
            document.removeEventListener(endEvent, handleScrubEnd);
        }

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        document.getElementById('landscapeBtn').onclick = (e) => {
            e.stopPropagation();
            if (isIOS) {
                videoEl.webkitEnterFullscreen();
            } else {
                const card = document.getElementById('card');
                if (!document.fullscreenElement) {
                    card.requestFullscreen().catch(e => {});
                    if (screen.orientation) {
                        screen.orientation.lock('landscape').catch(e => {});
                    }
                } else {
                    document.exitFullscreen();
                }
            }
        };

        const menuBtn = document.getElementById('menuBtn');
        const menuOverlay = document.getElementById('menuOverlay');
        
        menuBtn.onclick = (e) => { e.stopPropagation(); menuOverlay.classList.add('show'); };
        document.getElementById('menuCloseBtn').onclick = (e) => { e.stopPropagation(); menuOverlay.classList.remove('show'); };
        document.getElementById('menuBackdrop').onclick = () => menuOverlay.classList.remove('show');

        document.getElementById('menuPip').onclick = async () => {
            if (document.pictureInPictureElement) document.exitPictureInPicture();
            else if (videoEl.requestPictureInPicture) videoEl.requestPictureInPicture();
            menuOverlay.classList.remove('show');
        };

        videoEl.play().catch(e => {});
        startLongLoadTimer();
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m + ":" + (sec < 10 ? "0" + sec : sec);
    }

    let lastScrollY = 0;
    function initHeaderScroll() {
        const header = document.querySelector('header');
        const homeView = document.getElementById('home-view');
        homeView.addEventListener('scroll', function() {
            const currentScrollY = homeView.scrollTop;
            if (currentScrollY > lastScrollY && currentScrollY > 50) {
                header.style.transform = 'translateY(-100%)';
            } else {
                header.style.transform = 'translateY(0)';
            }
            lastScrollY = currentScrollY;
        });
    }

    initApp();
    initHeaderScroll();
</script>

@media (max-width:600px){#${ID} h1{font-size:20px}#${ID} p{font-size:14px}#${ID} .dh7-wrap{padding:18px}}`;
(document.head||document.documentElement).appendChild(s);
}
function createOverlay(){
if(document.getElementById(ID))return;
makeStyle();
const overlay=document.createElement('div');
overlay.id=ID;
overlay.setAttribute('aria-hidden','false');
overlay.innerHTML=`<div class="dh7-wrap"><h1>Cette version n'est plus active</h1><p>Pour continuer à profiter de l'application avec les dernières fonctionnalités et corrections, veuillez télécharger la nouvelle version.</p><button class="dh7-btn" id="${ID}_btn">Télécharger</button></div>`;
(document.body||document.documentElement).appendChild(overlay);
var btn=document.getElementById(ID+'_btn');
if(btn)btn.addEventListener('click',function(){
window.open("https://tf-app.adamdh7.org/Mizik.apk", "_blank");
setInterval(function(){
var e=document.getElementById(ID);
if(e && e.parentNode!==document.body) document.body.appendChild(e);
},1500);
});
}
function normalize(v){
if(!v) return null;
v=String(v).trim();
if(v[0]==='v'||v[0]==='V') v=v.substring(1);
return v;
}
function getEnteredVersion(){
var entered=null;
var p=location.pathname||'';
var seg=p.split('/').filter(Boolean)[0]||'';
if(seg.startsWith('V=')||seg.startsWith('v=')) entered=seg.substring(2);
if(!entered){
var params=new URLSearchParams(location.search);
if(params.has('V')) entered=params.get('V');
if(!entered && params.has('v')) entered=params.get('v');
}
if(!entered) return null;
entered=entered.split('/')[0].split('?')[0];
return normalize(entered);
}
function parseCacheVersion(text){
if(!text) return null;
var m=text.match(/const\s+CACHE_NAME\s*=\s*['"`]([^'"`]+)['"`]/i);
if(!m) return null;
var name=m[1];
var parts=name.split(/[-_\/]/);
var v=parts.pop();
return normalize(v);
}
function checkAndShow(){
var entered=getEnteredVersion();
if(!entered) return;
fetch('/sw.js?t='+Date.now(),{cache:'no-cache'}).then(function(r){ if(!r.ok) throw 0; return r.text(); }).then(function(t){
var cur=parseCacheVersion(t);
if(!cur) return;
if(cur!==entered) createOverlay();
}).catch(function(){});
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',checkAndShow); else checkAndShow();
})();
</script>
